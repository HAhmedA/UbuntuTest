# For servers that already run nginx on 80/443 — no Caddy.
# Your existing server nginx proxies to localhost:8082.
#
# Usage:
#   docker compose -f compose.yml -f compose.nginx.yml up -d --build
#
# Required .env: DOMAIN, SESSION_SECRET, PGPASSWORD
# Optional .env: MOODLE_BASE_URL, MOODLE_TOKEN (leave blank if not using Moodle)

services:
  web:
    # Bind only on loopback — your server nginx reaches it; internet cannot
    ports:
      - "127.0.0.1:8082:80"

  backend:
    # Not exposed to host — inner nginx proxies /api/* to backend:8080 over Docker network
    ports: []
    environment:
      - NODE_ENV=production
      - DEBUG_LLM=false
      - SIMULATION_MODE=false
      - CORS_ORIGINS=https://${DOMAIN}
      - MOODLE_BASE_URL=${MOODLE_BASE_URL:-}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    volumes:
      - logs:/app/logs

  postgres:
    # Never expose postgres to the host in production
    ports: []

volumes:
  logs:
    driver: local
