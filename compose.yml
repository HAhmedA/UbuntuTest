services:
  web:
    # React app built to static files and served via nginx
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Frontend calls backend via same-origin proxy (/api -> backend:8080)
        REACT_APP_API_BASE: "/api"
    ports:
      - "3000:80" # expose the web app on localhost:3000
    depends_on:
      - backend

  backend:
    # Express API with session auth and Postgres persistence
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - SESSION_SECRET=${SESSION_SECRET}
      - PGHOST=postgres
      - PGPORT=5432
      - PGUSER=postgres
      - PGPASSWORD=${PGPASSWORD}
      - PGDATABASE=postgres
      - DATABASE_URL=postgres://${PGUSER:-postgres}:${PGPASSWORD}@postgres:5432/${PGDATABASE:-postgres}
      - DEBUG_LLM=true
      - MOODLE_BASE_URL=http://host.docker.internal:8888/moodle501
      - MOODLE_TOKEN=${MOODLE_TOKEN:-}
      - NODE_OPTIONS=--dns-result-order=ipv4first
    ports:
      - "8080:8080" # expose the API on localhost:8080
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    # Postgres 18 with init SQL; mounts at /var/lib/postgresql per 18+ images
    image: postgres:18.0
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${PGPASSWORD}
      - POSTGRES_DB=postgres
    ports:
      - "5433:5432" # forward host 5433 to container 5432
    # WARNING: upgrading postgres major version requires manual data migration.
    # Existing pgdata volumes from Postgres 17 are incompatible with Postgres 18
    # (data directory layout changed). Wipe the volume before upgrading:
    #   docker compose down -v && docker compose up -d
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

networks:
  default:
    name: survey-net # shared network so services can resolve each other by name

volumes:
  pgdata: # persistent database storage (kept across container restarts)

