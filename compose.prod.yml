# Production overrides — use with: docker compose -f compose.yml -f compose.prod.yml up -d
# Requires in .env: DOMAIN, SESSION_SECRET, PGPASSWORD
# Optional in .env: MOODLE_BASE_URL, MOODLE_TOKEN (leave blank if not using Moodle)

services:
  # HTTPS reverse proxy — auto-obtains Let's Encrypt certificate for $DOMAIN
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"       # HTTP (redirects to HTTPS automatically)
      - "443:443"     # HTTPS
      - "443:443/udp" # HTTP/3
    volumes:
      - caddy_data:/data                      # certificate storage (persist across restarts)
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      - web
    restart: unless-stopped

  web:
    # Close host port — Caddy is the only public entry point
    ports: []

  backend:
    # Close host port — nginx inside 'web' proxies /api/ to backend:8080 internally
    ports: []
    environment:
      - NODE_ENV=production
      - DEBUG_LLM=false
      - SIMULATION_MODE=false
      - CORS_ORIGINS=https://${DOMAIN}
      - MOODLE_BASE_URL=${MOODLE_BASE_URL:-}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    volumes:
      - logs:/app/logs

  postgres:
    # Do not expose postgres port to host in production
    ports: []

volumes:
  logs:
    driver: local
  caddy_data:
    driver: local
